<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="usuario.css">
    <title>Cadastro</title>
</head>
<body>
    <div class="container">
        <form class="form" id="cadastro-form">
            <h2>Cadastro</h2>
            <div class="input-group">
                <label for="cadastro-nome">Nome:</label>
                <input type="text" id="cadastro-nome" required>
            </div>
            <div class="input-group">
                <label for="cadastro-email">Email:</label>
                <input type="email" id="cadastro-email" required>
            </div>
            <div class="input-group">
                <label for="cadastro-senha">Senha:</label>
                <input type="password" id="cadastro-senha" required>
            </div>
            <button type="submit"><a href=".index.html">Cadastrar</a</button>
                
            <p>Já tem uma conta? <a href="login.html">Faça login</a></p>
        </form>
    </div>
</body>
</html>
