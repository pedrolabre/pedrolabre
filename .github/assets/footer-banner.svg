<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 100" width="100%" height="100" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0d14"/>
      <stop offset="100%" stop-color="#0f131f"/>
    </linearGradient>
    
    <!-- Neon Gradients -->
    <linearGradient id="neonPurpleCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
    
    <!-- Tech Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.03"/>
    </pattern>
    
    <!-- Glow Filter -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Styles -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&amp;family=Fira+Code:wght@500&amp;display=swap');
    
    .footer-text {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 700;
      font-size: 16px;
      fill: #e2e8f0;
      letter-spacing: 1px;
    }
    
    .accent-text {
      fill: url(#neonPurpleCyan);
    }
    
    .prompt-text {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      fill: #8b949e;
      opacity: 0.8;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }
    
    .cursor {
      fill: #00D9FF;
      animation: pulse 1.5s infinite;
    }
  </style>

  <!-- Background -->
  <rect width="850" height="100" fill="url(#bgGrad)"/>
  <rect width="850" height="100" fill="url(#grid)"/>
  
  <!-- Glowing border at the bottom -->
  <line x1="0" y1="100" x2="850" y2="100" stroke="url(#neonPurpleCyan)" stroke-width="3" filter="url(#glowCyan)"/>
  
  <!-- Corners -->
  <path d="M 25 15 L 25 25 L 15 25" fill="none" stroke="#7B2FFF" stroke-width="1.5" opacity="0.6"/>
  <path d="M 825 15 L 825 25 L 835 25" fill="none" stroke="#00D9FF" stroke-width="1.5" opacity="0.6"/>
  <path d="M 25 85 L 25 75 L 15 75" fill="none" stroke="#00D9FF" stroke-width="1.5" opacity="0.6"/>
  <path d="M 825 85 L 825 75 L 835 75" fill="none" stroke="#7B2FFF" stroke-width="1.5" opacity="0.6"/>

  <!-- Left Text -->
  <g transform="translate(50, 42)">
    <text class="footer-text">Vamos nos conectar! <tspan class="accent-text">• Let's build something pragmatically.</tspan></text>
  </g>

  <!-- Right Prompt -->
  <g transform="translate(580, 52)">
    <text class="prompt-text">pedrolabre ~/portfolio _</text>
    <rect x="180" y="-12" width="8" height="14" class="cursor"/>
  </g>
</svg>
